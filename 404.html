<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - HOLYSTONE Construction</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="./assets/logo/logo.jfif" type="image/jpeg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #FAF9F6;
            color: #1A1A1A;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .error-container { max-width: 520px; }
        .error-code {
            font-size: clamp(80px, 20vw, 140px);
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B35, #A3E635);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 { font-size: 28px; font-weight: 600; margin-bottom: 12px; }
        p { font-size: 16px; color: #475569; line-height: 1.6; margin-bottom: 32px; }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background-color: #FF6B35;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        .btn-home:hover {
            background-color: transparent;
            color: #FF6B35;
            box-shadow: inset 0 0 0 2px #FF6B35;
            transform: translateY(-2px);
        }
        .footer-text { margin-top: 48px; font-size: 13px; color: #94A3B8; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back to building dreams.</p>
        <a href="index.html" class="btn-home">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 10L10 3L17 10M5 8V16H8.5V12H11.5V16H15V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Back to Home
        </a>
        <p class="footer-text">HOLYSTONE Construction Company</p>
    </div>
</body>
</html>
